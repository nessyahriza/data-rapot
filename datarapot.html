<!doctype html>
<html lang="id" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Nilai Raport XI-3</title>
    
    <!-- External Libraries -->
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * { font-family: 'Plus Jakarta Sans', sans-serif; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes countUp { from { opacity: 0; transform: scale(0.5); } to { opacity: 1; transform: scale(1); } }
        .fade-up { animation: fadeUp 0.5s ease forwards; }
        .count-anim { animation: countUp 0.4s ease forwards; }
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(99,102,241,0.15); }
        .gradient-header { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 50%, #6366f1 100%); }
        .badge-card { background: white; border: 1px solid #e5e7eb; }
        .table-row:hover { background: #f5f3ff; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #a78bfa; border-radius: 3px; }
        body { box-sizing: border-box; }
    </style>
</head>
<body class="h-full bg-gray-50">
    <div id="app" class="h-full w-full overflow-auto">
        <!-- Header -->
        <header class="gradient-header text-white py-8 px-6 shadow-lg">
            <div class="max-w-7xl mx-auto">
                <h1 id="main-title" class="text-2xl md:text-3xl font-800 tracking-tight">Dashboard Nilai Raport XI-3</h1>
                <p class="text-indigo-100 mt-1 text-sm">Sistem Informasi Akademik</p>
            </div>
        </header>

        <div class="max-w-7xl mx-auto px-4 md:px-6 py-6 space-y-6">
            <!-- Stats Badges -->
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 fade-up">
                <div class="badge-card rounded-xl p-5 card-hover flex items-center gap-4">
                    <div class="w-12 h-12 rounded-full bg-indigo-100 flex items-center justify-center">
                        <i data-lucide="users" class="w-6 h-6 text-indigo-600"></i>
                    </div>
                    <div>
                        <p class="text-xs text-gray-500 uppercase font-600">Jumlah Siswa</p>
                        <p id="stat-total" class="text-2xl font-800 text-indigo-700 count-anim">0</p>
                    </div>
                </div>
                <div class="badge-card rounded-xl p-5 card-hover flex items-center gap-4">
                    <div class="w-12 h-12 rounded-full bg-blue-100 flex items-center justify-center">
                        <i data-lucide="user" class="w-6 h-6 text-blue-600"></i>
                    </div>
                    <div>
                        <p class="text-xs text-gray-500 uppercase font-600">Laki-laki</p>
                        <p id="stat-male" class="text-2xl font-800 text-blue-700 count-anim">0</p>
                    </div>
                </div>
                <div class="badge-card rounded-xl p-5 card-hover flex items-center gap-4">
                    <div class="w-12 h-12 rounded-full bg-purple-100 flex items-center justify-center">
                        <i data-lucide="user" class="w-6 h-6 text-purple-600"></i>
                    </div>
                    <div>
                        <p class="text-xs text-gray-500 uppercase font-600">Perempuan</p>
                        <p id="stat-female" class="text-2xl font-800 text-purple-700 count-anim">0</p>
                    </div>
                </div>
            </div>

            <!-- Class Average -->
            <div class="bg-white border border-gray-200 rounded-xl p-4 flex items-center gap-3 fade-up" style="animation-delay:0.1s">
                <div class="w-10 h-10 rounded-full bg-gradient-to-br from-indigo-500 to-purple-500 flex items-center justify-center">
                    <i data-lucide="bar-chart-2" class="w-5 h-5 text-white"></i>
                </div>
                <div>
                    <p class="text-xs text-gray-500">Rata-rata Kelas</p>
                    <p id="class-avg" class="text-lg font-700 text-indigo-700">0.00</p>
                </div>
            </div>

            <!-- Filters -->
            <div class="bg-white border border-gray-200 rounded-xl p-4 fade-up" style="animation-delay:0.2s">
                <div class="flex flex-wrap gap-3">
                    <div class="flex-1 min-w-[180px]">
                        <div class="relative">
                            <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i> 
                            <input id="search-input" type="text" placeholder="Cari nama siswa..." class="w-full pl-10 pr-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300 focus:border-indigo-400">
                        </div>
                    </div>
                    <select id="filter-gender" class="px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300"> 
                        <option value="">Semua Gender</option> 
                        <option value="Laki-laki">Laki-laki</option> 
                        <option value="Perempuan">Perempuan</option> 
                    </select> 
                    <select id="filter-class" class="px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300"> 
                        <option value="">Semua Kelas</option> 
                    </select> 
                    <select id="sort-select" class="px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300"> 
                        <option value="">Urutkan</option> 
                        <option value="desc">Rata-rata Tertinggi</option> 
                        <option value="asc">Rata-rata Terendah</option> 
                    </select> 
                    <button id="refresh-btn" class="px-4 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg text-sm font-600 flex items-center gap-2 transition-colors"> 
                        <i data-lucide="refresh-cw" class="w-4 h-4"></i> Refresh 
                    </button>
                </div>
            </div>

            <!-- Table -->
            <div class="bg-white border border-gray-200 rounded-xl overflow-hidden fade-up" style="animation-delay:0.3s">
                <div id="loading" class="p-12 text-center">
                    <div class="inline-block w-8 h-8 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin"></div>
                    <p class="mt-3 text-sm text-gray-500">Memuat data dari Google Sheet...</p>
                </div>
                
                <div id="table-container" class="hidden overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead class="bg-gradient-to-r from-indigo-50 to-purple-50 border-b border-gray-200">
                            <tr>
                                <th class="px-4 py-3 text-left font-600 text-gray-700">No</th>
                                <th class="px-4 py-3 text-left font-600 text-gray-700">Nama</th>
                                <th class="px-4 py-3 text-left font-600 text-gray-700">Gender</th>
                                <th class="px-4 py-3 text-left font-600 text-gray-700">Kelas</th>
                                <th class="px-4 py-3 text-center font-600 text-gray-700">MTK</th>
                                <th class="px-4 py-3 text-center font-600 text-gray-700">B.Ing</th>
                                <th class="px-4 py-3 text-center font-600 text-gray-700">B.Indo</th>
                                <th class="px-4 py-3 text-center font-600 text-gray-700">Fisika</th>
                                <th class="px-4 py-3 text-center font-600 text-gray-700">Biologi</th>
                                <th class="px-4 py-3 text-center font-600 text-gray-700">Rata-rata</th>
                            </tr>
                        </thead>
                        <tbody id="table-body"></tbody>
                    </table>
                </div>

                <div id="empty-state" class="hidden p-12 text-center">
                    <i data-lucide="inbox" class="w-12 h-12 text-gray-300 mx-auto"></i>
                    <p class="mt-3 text-gray-500">Tidak ada data ditemukan</p>
                </div>
            </div>

            <!-- Pagination -->
            <div id="pagination" class="flex justify-center items-center gap-2 pb-6"></div>
        </div>
    </div>

    <script>
        // Konfigurasi Google Sheets API
        const SPREADSHEET_ID = '1J90j0XJ8CtWzMhpF2FPUZpDPAeNRPlRa7--Ci4l_il8';
        const API_KEY = 'AIzaSyCHi-NTJACKB5HFWiNFNjGh7vGrDJyrn4Q';
        const SHEET_NAME = 'Sheet1';
        const PER_PAGE = 15;

        let allData = [];
        let filteredData = [];
        let currentPage = 1;

        // Fetch data dari Google Sheets
        async function fetchData() {
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('table-container').classList.add('hidden');
            document.getElementById('empty-state').classList.add('hidden');

            try {
                const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${SHEET_NAME}?key=${API_KEY}`;
                const res = await fetch(url);
                const json = await res.json();

                if (!json.values || json.values.length < 2) {
                    showEmpty();
                    return;
                }

                const rows = json.values.slice(1); // melewati baris header (baris pertama)
                allData = rows.map((row, i) => {
                    const mtk = parseFloat(row[4]) || 0;
                    const bing = parseFloat(row[5]) || 0;
                    const bindo = parseFloat(row[6]) || 0;
                    const fisika = parseFloat(row[7]) || 0;
                    const bio = parseFloat(row[8]) || 0;
                    const avg = (mtk + bing + bindo + fisika + bio) / 5;
                    return {
                        no: i + 1,
                        nama: row[1] || '',
                        gender: row[2] || '',
                        kelas: row[3] || '',
                        mtk, bing, bindo, fisika, bio,
                        avg: Math.round(avg * 100) / 100
                    };
                });

                populateClassFilter();
                applyFilters();
                updateStats();
            } catch (e) {
                console.error('Fetch error:', e);
                showEmpty();
            }
        }

        function populateClassFilter() {
            const classes = [...new Set(allData.map(d => d.kelas))].sort();
            const sel = document.getElementById('filter-class');
            sel.innerHTML = '<option value="">Semua Kelas</option>';
            classes.forEach(c => {
                if (c) sel.innerHTML += `<option value="${c}">${c}</option>`;
            });
        }

        function updateStats() {
            const total = allData.length;
            const male = allData.filter(d => d.gender === 'Laki-laki').length;
            const female = allData.filter(d => d.gender === 'Perempuan').length;
            animateCount('stat-total', total);
            animateCount('stat-male', male);
            animateCount('stat-female', female);

            const classAvg = total > 0 ? (allData.reduce((s, d) => s + d.avg, 0) / total).toFixed(2) : '0.00';
            document.getElementById('class-avg').textContent = classAvg;
        }

        function animateCount(id, target) {
            const el = document.getElementById(id);
            let current = parseInt(el.textContent) || 0;
            const step = Math.max(1, Math.floor(target / 20));
            const interval = setInterval(() => {
                current += step;
                if (current >= target) { 
                    current = target; 
                    clearInterval(interval); 
                }
                el.textContent = current;
            }, 30);
        }

        function applyFilters() {
            const search = document.getElementById('search-input').value.toLowerCase();
            const gender = document.getElementById('filter-gender').value;
            const kelas = document.getElementById('filter-class').value;
            const sort = document.getElementById('sort-select').value;

            filteredData = allData.filter(d => {
                if (search && !d.nama.toLowerCase().includes(search)) return false;
                if (gender && d.gender !== gender) return false;
                if (kelas && d.kelas !== kelas) return false;
                return true;
            });

            if (sort === 'desc') filteredData.sort((a, b) => b.avg - a.avg);
            else if (sort === 'asc') filteredData.sort((a, b) => a.avg - b.avg);

            currentPage = 1;
            renderTable();
        }

        function renderTable() {
            const start = (currentPage - 1) * PER_PAGE;
            const pageData = filteredData.slice(start, start + PER_PAGE);

            if (filteredData.length === 0) { 
                showEmpty(); 
                return; 
            }

            document.getElementById('loading').classList.add('hidden');
            document.getElementById('empty-state').classList.add('hidden');
            document.getElementById('table-container').classList.remove('hidden');

            const tbody = document.getElementById('table-body');
            tbody.innerHTML = pageData.map((d, i) => `
                <tr class="table-row border-b border-gray-100 transition-colors">
                    <td class="px-4 py-3 text-gray-600">${start + i + 1}</td>
                    <td class="px-4 py-3 font-500 text-gray-800">${d.nama}</td>
                    <td class="px-4 py-3"><span class="px-2 py-0.5 rounded-full text-xs font-500 ${d.gender === 'Laki-laki' ? 'bg-blue-100 text-blue-700' : 'bg-purple-100 text-purple-700'}">${d.gender}</span></td>
                    <td class="px-4 py-3 text-gray-600">${d.kelas}</td>
                    <td class="px-4 py-3 text-center">${scoreBadge(d.mtk)}</td>
                    <td class="px-4 py-3 text-center">${scoreBadge(d.bing)}</td>
                    <td class="px-4 py-3 text-center">${scoreBadge(d.bindo)}</td>
                    <td class="px-4 py-3 text-center">${scoreBadge(d.fisika)}</td>
                    <td class="px-4 py-3 text-center">${scoreBadge(d.bio)}</td>
                    <td class="px-4 py-3 text-center font-700">${scoreBadge(d.avg)}</td>
                </tr>
            `).join('');

            renderPagination();
        }

        function scoreBadge(val) {
            const color = val >= 90 ? 'text-emerald-600 bg-emerald-50' : val >= 80 ? 'text-amber-600 bg-amber-50' : 'text-red-600 bg-red-50';
            return `<span class="px-2 py-0.5 rounded text-xs font-600 ${color}">${val}</span>`;
        }

        function renderPagination() {
            const totalPages = Math.ceil(filteredData.length / PER_PAGE);
            const container = document.getElementById('pagination');
            if (totalPages <= 1) { 
                container.innerHTML = ''; 
                return; 
            }

            let html = '';
            for (let i = 1; i <= totalPages; i++) {
                const active = i === currentPage ? 'bg-indigo-600 text-white' : 'bg-white text-gray-700 border border-gray-200 hover:bg-indigo-50';
                html += `<button onclick="goPage(${i})" class="w-9 h-9 rounded-lg text-sm font-500 ${active} transition-colors">${i}</button>`;
            }
            container.innerHTML = html;
        }

        function goPage(p) { 
            currentPage = p; 
            renderTable(); 
        }

        function showEmpty() {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('table-container').classList.add('hidden');
            document.getElementById('empty-state').classList.remove('hidden');
            document.getElementById('pagination').innerHTML = '';
        }

        // Event listeners
        document.getElementById('search-input').addEventListener('input', applyFilters);
        document.getElementById('filter-gender').addEventListener('change', applyFilters);
        document.getElementById('filter-class').addEventListener('change', applyFilters);
        document.getElementById('sort-select').addEventListener('change', applyFilters);
        document.getElementById('refresh-btn').addEventListener('click', fetchData);

        // Inisialisasi Script saat halaman dimuat
        fetchData();
        lucide.createIcons(); // Memuat icon dari lucide
    </script>
</body>
  </html>
